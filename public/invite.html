<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Join Gatherli</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      max-width: 400px;
      width: 100%;
      padding: 40px 28px 36px;
      text-align: center;
    }

    .logo {
      width: 88px;
      height: 88px;
      border-radius: 20px;
      margin: 0 auto 20px;
      display: block;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 10px;
      line-height: 1.35;
    }

    p {
      font-size: 15px;
      color: #4a5568;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* Store badge buttons */
    .badge-btn {
      display: block;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      margin: 0 auto;
      transition: opacity .15s ease, transform .1s ease;
    }

    .badge-btn:hover  { opacity: .88; }
    .badge-btn:active { opacity: .75; transform: scale(.97); }

    .badge-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    .badge-img {
      height: 52px;
      width: auto;
      display: block;
    }

    /* Android redirecting state */
    .redirecting-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #e2e8f0;
      border-top-color: #1565C0;
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .redirecting-text { color: #718096; font-size: 14px; margin-bottom: 0; }

    /* Fallback: two badges stacked */
    .badge-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
  </style>
</head>
<body>
<div class="card">
  <img class="logo" src="/logo.svg?v=2" alt="Gatherli">

  <!-- iOS: shown, requires user tap to write clipboard -->
  <div id="ios-view" style="display:none">
    <h1>You've been invited to Gatherli</h1>
    <p>Tap below to download the app and join your group.</p>
    <button class="badge-btn" id="ios-btn" onclick="handleIos()" aria-label="Download on the App Store">
      <img class="badge-img" src="/badge-app-store.svg" alt="Download on the App Store">
    </button>
  </div>

  <!-- Android: shown briefly while auto-redirecting -->
  <div id="android-view" style="display:none">
    <h1>Opening the Play Store…</h1>
    <p class="redirecting-text">Redirecting you to Google Play to install Gatherli.</p>
    <div class="redirecting-wrap">
      <span class="spinner"></span>
      <img class="badge-img" src="/badge-google-play.png" alt="Get it on Google Play" style="opacity:.45">
    </div>
  </div>

  <!-- Desktop / unknown: no auto-redirect, show both store links -->
  <div id="fallback-view" style="display:none">
    <h1>You've been invited to Gatherli</h1>
    <p>Download the app on your phone to join your group.</p>
    <div class="badge-stack">
      <a id="fallback-ios" href="#" aria-label="Download on the App Store">
        <img class="badge-img" src="/badge-app-store.svg" alt="Download on the App Store">
      </a>
      <a id="fallback-android" href="#" aria-label="Get it on Google Play">
        <img class="badge-img" src="/badge-google-play.png" alt="Get it on Google Play">
      </a>
    </div>
  </div>
</div>

<script>
(function () {
  // ── Constants ──────────────────────────────────────────────────────────────
  // TODO: replace with real App Store ID once Gatherli is published
  var APP_STORE_URL  = 'https://apps.apple.com/app/gatherli/id000000000';
  var PLAY_STORE_ID  = 'org.gatherli.app';
  var CUSTOM_SCHEME  = 'gatherli://invite/';

  // ── Token extraction ───────────────────────────────────────────────────────
  // Path is /invite/{token}. Split and take the last non-empty segment.
  var segments = window.location.pathname.split('/').filter(Boolean);
  var token = segments[segments.length - 1] || '';
  // Reject obviously invalid tokens (must be /invite/{something})
  if (token === 'invite') token = '';

  // ── Platform detection ─────────────────────────────────────────────────────
  var ua = navigator.userAgent || '';
  var isIOS     = /ipad|iphone|ipod/i.test(ua) && !window.MSStream;
  var isAndroid = /android/i.test(ua);

  // ── Route ──────────────────────────────────────────────────────────────────
  if (isAndroid) {
    showAndroid();
    redirectAndroid();
  } else if (isIOS) {
    showIOS();
  } else {
    showFallback();
  }

  // ── Android: auto-redirect with Play Install Referrer ─────────────────────
  function redirectAndroid() {
    var referrer = token
      ? encodeURIComponent('invite_token=' + token)
      : '';
    var url = 'https://play.google.com/store/apps/details?id=' + PLAY_STORE_ID;
    if (referrer) url += '&referrer=' + referrer;
    // replace() so the redirect page is not in browser history
    window.location.replace(url);
  }

  // ── iOS: clipboard write on user tap, then App Store redirect ─────────────
  window.handleIos = function () {
    var btn = document.getElementById('ios-btn');
    if (btn) btn.disabled = true;

    var deepLink = token ? CUSTOM_SCHEME + token : '';

    function goToAppStore() {
      window.location.href = APP_STORE_URL;
    }

    if (deepLink && navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(deepLink)
        .then(goToAppStore)
        .catch(goToAppStore); // proceed even if clipboard write is denied
    } else {
      goToAppStore();
    }
  };

  // ── View helpers ───────────────────────────────────────────────────────────
  function showAndroid() {
    document.getElementById('android-view').style.display = 'block';
  }

  function showIOS() {
    document.getElementById('ios-view').style.display = 'block';
  }

  function showFallback() {
    document.getElementById('fallback-view').style.display = 'block';
    var referrer = token ? encodeURIComponent('invite_token=' + token) : '';
    var androidUrl = 'https://play.google.com/store/apps/details?id=' + PLAY_STORE_ID
      + (referrer ? '&referrer=' + referrer : '');
    var el = document.getElementById('fallback-android');
    if (el) el.href = androidUrl;
    var iosEl = document.getElementById('fallback-ios');
    if (iosEl) iosEl.href = APP_STORE_URL;
  }
}());
</script>
</body>
</html>
