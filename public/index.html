<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gatherli — Organize. Play. Track your game.</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      -webkit-font-smoothing: antialiased;
      color: #1a202c;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      max-width: 480px;
      width: 100%;
      padding: 56px 40px;
      text-align: center;
    }

    @media (max-width: 520px) {
      .card { padding: 40px 24px; }
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin: 0 auto 24px;
      display: block;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      color: #004E64;
      letter-spacing: -0.6px;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: 17px;
      color: #718096;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .badges {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .badge img {
      height: 44px;
      display: block;
    }

    .links {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      font-size: 14px;
      color: #004E64;
      text-decoration: none;
      opacity: 0.7;
    }

    .links a:hover {
      opacity: 1;
      text-decoration: underline;
    }

    footer {
      margin-top: 40px;
      font-size: 13px;
      color: #a0aec0;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/logo-96.png" alt="Gatherli logo">
    <h1>Gatherli</h1>
    <p class="tagline">Organize sports games, track ELO ratings<br>and train with your group.</p>

    <div class="badges">
      <a class="badge" href="https://apps.apple.com/app/id6760428234" target="_blank" rel="noopener">
        <img src="/badge-app-store.svg" alt="Download on the App Store">
      </a>
      <a class="badge" href="https://play.google.com/store/apps/details?id=org.gatherli.app" target="_blank" rel="noopener">
        <img src="/badge-google-play.png" alt="Get it on Google Play">
      </a>
    </div>

    <div class="links">
      <a href="/privacy">Privacy Policy</a>
      <a href="/delete-account">Delete Account</a>
      <a href="mailto:admin@gatherli.org">Contact</a>
    </div>

    <footer>&copy; 2026 Gatherli</footer>
  </div>
</body>
</html>
